name: Deploy to o2switch

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- FRONTEND BUILD ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      # --- BACKEND PREPARATION ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, gd, zip

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: composer install --no-dev --optimize-autoloader

      # --- DEPLOYMENT ---
      - name: Validate Secrets and Deploy
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then echo "❌ SSH_HOST is missing"; exit 1; fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then echo "❌ SSH_USER is missing"; exit 1; fi
          if [ -z "${{ secrets.REMOTE_PATH }}" ]; then echo "❌ REMOTE_PATH is missing"; exit 1; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "❌ SSH_PRIVATE_KEY is missing"; exit 1; fi
          
          echo "✅ All secrets detected. Starting deployment..."
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key
          chmod 600 private_key
          rsync -avz -e "ssh -i private_key -p 2222 -o StrictHostKeyChecking=no" \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.REMOTE_PATH }}
          rm private_key

      # --- POST-DEPLOYMENT COMMANDS ---
      - name: Post-deployment Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd ${{ secrets.REMOTE_PATH }}/backend
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
